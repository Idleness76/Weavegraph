[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "OpenSSL",
    "Zlib",
    "Unicode-3.0",
    "Unlicense",
    "LGPL-2.1-or-later",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
]

[advisories]
ignore = []

[bans]
# Multiple versions of these crates are unavoidable transitive dependencies
# They come from incompatible version ranges in upstream dependencies
multiple-versions = "warn"
